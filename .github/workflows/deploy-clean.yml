# #
#   jobs
# #

jobs:
    cleanup:
        runs-on: ubuntu-latest
        permissions: write-all
  
        steps:
            - name: >-
                ⚙️ Deployments › Clean
              uses: Aetherinox/delete-deploy-env-action@v3
              with:
                  token: ${{ secrets.SELF_TOKEN_CL }}
                  environment: orion
                  onlyRemoveDeployments: true